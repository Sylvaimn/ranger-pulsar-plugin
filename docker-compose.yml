version: '3.8'

services:
  zookeeper:
    image: zookeeper:3.7
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zookeeper:2888:3888
      ZOO_4LW_COMMANDS_WHITELIST: "*"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || echo imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  pulsar:
    image: apachepulsar/pulsar:3.1.0
    container_name: pulsar
    ports:
      - "6650:6650"
      - "8080:8080"
    environment:
      PULSAR_MEM: "-Xms512m -Xmx1g"
    user: root
    command: >
      bash -c "
      echo '=== Installing Ranger Pulsar Plugin ===' &&
      cp /plugin/ranger-pulsar-plugin-1.0.0-SNAPSHOT.jar /pulsar/lib/ &&
      chmod 644 /pulsar/lib/ranger-pulsar-plugin-1.0.0-SNAPSHOT.jar &&
      echo 'Plugin JAR installed to /pulsar/lib/' &&
      echo '=== Starting Pulsar Standalone ===' &&
      /pulsar/bin/pulsar standalone --advertised-address pulsar
      "
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - ./target/ranger-pulsar-plugin-1.0.0-SNAPSHOT.jar:/plugin/ranger-pulsar-plugin-1.0.0-SNAPSHOT.jar
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/admin/v2/clusters"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s

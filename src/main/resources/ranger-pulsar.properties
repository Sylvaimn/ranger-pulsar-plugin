# Ranger Pulsar Plugin Configuration
# 配置优先级：默认值 < 配置文件 < 环境变量 < 系统属性

# === 基础配置 ===
ranger.pulsar.service.name=pulsar
ranger.pulsar.cluster.name=standalone
ranger.pulsar.auth.enabled=true
ranger.pulsar.audit.enabled=true

# === 缓存配置 ===
ranger.pulsar.cache.size=10000
ranger.pulsar.cache.ttl.seconds=300

# === 策略同步配置 ===
ranger.pulsar.sync.enabled=true
ranger.pulsar.sync.interval.seconds=30
ranger.pulsar.sync.retry.max=3
ranger.pulsar.sync.retry.backoff.ms=1000

# === Ranger Admin HTTP 配置 ===
ranger.pulsar.admin.url=http://localhost:6080
ranger.pulsar.http.connect.timeout.ms=5000
ranger.pulsar.http.read.timeout.ms=10000

# === SSL 配置 ===
ranger.pulsar.ssl.enabled=false

# === Ranger Admin 认证 ===
ranger.pulsar.admin.auth.user=
ranger.pulsar.admin.auth.password=

# === 审计配置 ===
ranger.pulsar.audit.max.queue=5000
